# py-xPT control file — 4D-LJ 2PT/3PT entropy from a md4d trajectory.
# Run:  python -m pyxpt examples/pyxpt_d4.ini
# The MD4D reader reads <trajectory>.vel + <trajectory>.meta; reduced velocities
# are converted to Angstrom/ps internally so the VACF recovers T = Tset*eps/kB.
# Edit [files] trajectory and [output] prefix for your run.

[files]
trajectory        = runs/example_r110_T10     # reads <prefix>.vel + <prefix>.meta
trajectory_format = MD4D

[system_properties]
timestep          = 0.008                     # ps (overridden by the per-frame dt)

[thermodynamics]
mode              = 3PT       # parameter-free 3PT (bare p=1/d memory cage)
molecular         = false     # monatomic (translational channel only)
hs_eos            = cs        # Carnahan-Starling / Luban-Michels (d=4)
dimension         = 4         # <-- the d=4 switch

[output]
prefix                = eng_d4_out
out_units             = lj    # reduced LJ entropy S* (= k_B/atom); reports S_q and S_c
normalize             = 1
show_classical_thermo = 1
lj_sigma              = 3.405
lj_epsilon            = 0.2381
lj_mass               = 39.948
